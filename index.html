<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قاموس قانون الإنترنت | جهاز المباحث الجنائية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #c6a334;
            --white: #ffffff;
            --bg-light: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-light);
            color: var(--primary);
        }

        .page {
            display: none;
            min-height: 100vh;
            width: 100%;
            padding: 40px 20px;
            animation: fadeIn 0.6s ease-in-out;
        }

        .page.active { display: flex; flex-direction: column; align-items: center; }

        /* الصفحة الرئيسية - تنسيق متجاوب */
        #home-page {
            background: 
                linear-gradient(rgba(10, 15, 30, 0.85), rgba(10, 15, 30, 0.85)), 
                url('https://scontent.fmji4-1.fna.fbcdn.net/v/t39.30808-6/503005132_1253362980132186_1304970719649993928_n.jpg?_nc_cat=101&ccb=1-7&_nc_sid=7b2446&_nc_eui2=AeFcrLRcX-r3Yf8Ftmx2eGiMqC3qqBYhN-eoLeqoFiE358b6RATfWiOkeKwooq4-Exb8vHwN3h5ZJxJazEXLK2DO&_nc_ohc=f3vXbcVLRQIQ7kNvwH5nhT1&_nc_oc=Adrmf3ZAvsAzalRYN6fle6AR-pa8Q8OVnTzsCpORAQLoB_KvSKbMfDJ4qf40Vu9_xdA&_nc_zt=23&_nc_ht=scontent.fmji4-1.fna&_nc_gid=058TtlUYNREpsByo_SZgIg&_nc_ss=7b2a8&oh=00_Af2xpA4T0mbZLRo8cKgFVJfXwUhP2IiHuQvde0OVXfjPdg&oe=69EF5876'); 
            background-size: cover;
            background-position: center top;
            color: white;
            justify-content: center;
            text-align: center;
        }

        /* تعديلات اللابتوب */
        @media (min-width: 1024px) {
            #home-page { background-attachment: fixed; background-position: center center; }
            .hero-content h1 { font-size: 4rem !important; }
        }

        /* تعديلات الهاتف */
        @media (max-width: 480px) {
            .hero-content h1 { font-size: 2.2rem !important; }
            .hero-btns { display: flex; flex-direction: column; width: 100%; align-items: center; }
            .btn { width: 85% !important; margin: 8px 0 !important; }
        }

        .hero-content h1 { font-weight: 900; color: var(--accent); margin-bottom: 15px; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .hero-content p { font-size: 1.2rem; margin-bottom: 35px; opacity: 0.9; line-height: 1.6; }

        .btn {
            padding: 16px 35px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            font-family: inherit;
            font-size: 1.1rem;
            text-decoration: none;
            display: inline-block;
        }
        .btn-main { background: var(--accent); color: var(--primary); }
        .btn-outline { background: transparent; border: 2px solid var(--accent); color: var(--accent); }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        /* القاموس */
        .container { width: 100%; max-width: 800px; padding-bottom: 80px; }
        .search-box { position: relative; margin-bottom: 25px; width: 100%; }
        #searchInput {
            width: 100%; padding: 18px 55px 18px 20px;
            border-radius: 15px; border: 2px solid #cbd5e1;
            font-family: inherit; font-size: 1.1rem; outline: none;
        }
        .search-icon { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: var(--accent); }

        .term-card { background: white; border-radius: 15px; margin-bottom: 12px; border: 1px solid #e2e8f0; overflow: hidden; }
        .term-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .term-header:hover { background: #f1f5f9; }
        .term-title { font-weight: 800; font-size: 1.1rem; }
        
        .term-content { display: none; padding: 20px; background: #fafafa; border-top: 1px dashed #e2e8f0; }
        .term-card.active .term-content { display: block; }
        .term-card.active .term-header { color: var(--accent); }

        .fixed-footer {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(15, 23, 42, 0.95); color: #94a3b8;
            text-align: center; padding: 12px; font-size: 0.85rem; z-index: 100;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <section id="home-page" class="page active">
        <div class="hero-content">
            <i data-lucide="shield-check" size="64" style="color: var(--accent); margin-bottom: 20px;"></i>
            <h1>قاموس قانون الإنترنت</h1>
            <p>إدارة مكافحة جرائم تقنية المعلومات<br>جهاز المباحث الجنائية</p>
            <div class="hero-btns">
                <button class="btn btn-main" onclick="showPage('dictionary-page')">فتح القاموس</button>
                <button class="btn btn-outline" onclick="showPage('contact-page')">اتصل بنا</button>
            </div>
        </div>
    </section>

    <section id="dictionary-page" class="page">
        <div class="container">
            <h2 style="margin-bottom: 25px; text-align: center; font-weight: 900;">المصطلحات المعتمدة</h2>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="بحث سريع في المصطلحات...">
                <i data-lucide="search" class="search-icon"></i>
            </div>
            <div id="termsList"></div>
            <center><button class="btn btn-outline" style="margin-top: 30px;" onclick="showPage('home-page')">رجوع للرئيسية</button></center>
        </div>
    </section>

    <section id="contact-page" class="page">
        <div class="container" style="text-align: center; margin-top: 50px;">
            <h2 style="margin-bottom: 30px; font-weight: 900;">قنوات التواصل الرسمي</h2>
            <div style="background: white; padding: 40px; border-radius: 20px; border: 1px solid #e2e8f0;">
                <p style="margin-bottom: 15px; font-size: 1.2rem;"><strong>البريد الإلكتروني:</strong><br>info@cid.gov.ly</p>
                <hr style="margin: 20px 0; opacity: 0.2;">
                <p style="font-size: 1.2rem;"><strong>رقم الهاتف:</strong><br>021-1234567</p>
            </div>
            <button class="btn btn-main" style="margin-top: 30px;" onclick="showPage('home-page')">العودة للرئيسية</button>
        </div>
    </section>

    <div class="fixed-footer">
        جميع الحقوق محفوظة &copy; 2026 - جهاز المباحث الجنائية
    </div>

    <script>
        const dictionaryData = [
            { ar: "ابتكار مفتوح", en: "Open Innovation", desc: "نموذج ابتكار يعتمد على أطراف خارجية، أفراداً أو مؤسسات، في تطوير الأفكار أو المنتجات عبر تعاون مفتوح يهدف إلى تبادل المعرفة وتسريع وتيرة التطوير." },
            { ar: "إبداع رقمي", en: "Digital Creativity", desc: "إنتاج أعمال أو محتوى إبداعي باستخدام أدوات وتقنيات رقمية، مثل التصميم الرقمي، المؤثرات البصرية، أو البرمجة الإبداعية." },
            { ar: "إتاحة المعلومات", en: "Availability", desc: "أحد عناصر أمن المعلومات، ويعني ضمان بقاء البيانات أو الخدمات الرقمية قابلة للوصول والاستخدام عند الحاجة إليها." },
            { ar: "إثبات رقمي", en: "Digital Evidence", desc: "كل معلومة أو أثر ذي طبيعة رقمية يُستخلص من أجهزة أو نظم معلومات، ويصلح للاحتجاج به في الإجراءات القضائية وفق قواعد قبول الأدلة وسلامة المصدر." },
            { ar: "أثر رقمي", en: "Digital Trace", desc: "بيانات أو علامات تخلّفها الأنشطة الرقمية للمستخدمين أو الأجهزة أو النظم ويمكن الاستدلال بها فنياً وقد تُستخدم قانونياً في التحقيق والإثبات." },
            { ar: "اجتماعات افتراضية", en: "Virtual Meetings", desc: "اجتماعات تُعقد عن بُعد عبر منصات رقمية تتيح تواصلاً متزامناً بالصوت أو الصوت والصورة، مع إمكان تبادل الملفات وإدارة الجلسة رقمياً." },
            { ar: "إخفاء الهوية", en: "Anonymity", desc: "حالة يتم فيها استخدام الوسائط الرقمية دون الكشف عن الهوية الحقيقية للمستخدم، سواء بوسائل تقنية أو قانونية." },
            { ar: "أخلاقيات رقمية", en: "Digital Ethics", desc: "مجموعة المبادئ والمعايير الأخلاقية التي تضبط سلوك الأفراد والمؤسسات عند استخدام التقنيات الرقمية بما يشمل احترام الخصوصية والشفافية." },
            { ar: "أداة مراقبة النشاط", en: "Activity Monitor", desc: "أداة أو برنامج يُستخدم لتتبع أنشطة المستخدم على الجهاز أو الشبكة، مثل الشاشات المفتوحة، وضربات المفاتيح، وسجل التصفح." },
            { ar: "أدلة مقبولة قضائياً", en: "Admissible Evidence", desc: "أدلة تستوفي الشروط القانونية والإجرائية اللازمة لقبولها أمام القضاء والاحتجاج بها، بحسب قواعد الإثبات المعمول بها." },
            { ar: "إدمان رقمي", en: "Digital Addiction", desc: "نمط استخدام مفرط أو متكرر للتقنيات الرقمية يفضي إلى آثار سلبية ملحوظة على الأداء أو العلاقات الاجتماعية." },
            { ar: "أدوات رقمية", en: "Digital Tools", desc: "وسائل أو برامج أو أجهزة أو تطبيقات تُستخدم في إنشاء أو معالجة أو تخزين أو نقل أو تحليل البيانات في البيئة الرقمية." },
            { ar: "إذن الوصول", en: "Access Rights", desc: "صلاحيات تُمنح للمستخدم تُمكّنه من الوصول إلى مورد رقمي معين أو استعماله، مثل ملف أو قاعدة بيانات أو خدمة." },
            { ar: "أرشفة", en: "Archive", desc: "حفظ منظم للسجلات أو المواد الرقمية غير الجارية في وسائط مخصصة للاحتفاظ الطويل الأمد، بما يضمن إمكان الرجوع إليها." },
            { ar: "أرشفة فردية", en: "Individual Archiving", desc: "احتفاظ الشخص أو الجهة بنسخ منظمة من الرسائل أو المستندات أو المواد الرقمية ذات الصلة بنشاطه أو حقوقه." },
            { ar: "أرقام تعريف ملفات الارتباط", en: "Cookie IDs", desc: "معرفات رقمية تُخزّن في متصفح المستخدم ضمن ملفات الارتباط لتمييز الجلسة أو الجهاز أو تفضيلات الاستخدام." },
            { ar: "استبعاد رقمي", en: "Digital Exclusion", desc: "حرمان بعض الأفراد أو الفئات من النفاذ إلى الخدمات أو المهارات الرقمية، بما يترتب عليه آثار اجتماعية واقتصادية." },
            { ar: "استضافة", en: "Hosting", desc: "خدمة تمكّن من إتاحة موقع أو تطبيق عبر الإنترنت، بتخزينه على خادم متصل بالشبكة وإدارته فنياً." },
            { ar: "استيثاق", en: "Authentication", desc: "عملية التحقق من هوية المستخدم أو الجهة التي تطلب النفاذ إلى النظام أو البيانات الرقمية قبل منحها حق الدخول." },
            { ar: "إسناد الهجوم الرقمي", en: "Attribution", desc: "عملية فنية وقانونية تهدف إلى تحديد الجهة المسؤولة عن فعل ضار وقع عبر وسائط رقمية استناداً إلى مؤشرات تقنية." },
            { ar: "إشعار أمني", en: "Advisory", desc: "إخطار معلوماتي يتضمن بياناً بثغرة أو خطر أو خلل أو إجراء تصحيحي، ويصدر غالباً لتنبيه المستخدمين." },
            { ar: "أصول رقمية", en: "Digital Assets", desc: "موجودات ذات قيمة اقتصادية أو قانونية في البيئة الرقمية، مثل قواعد البيانات، أو البرمجيات، أو الحقوق الرقمية." },
            { ar: "اعتماد رقمي", en: "Digital Certification", desc: "إجراء قانوني أو تقني يمنح مصادقة رسمية على هوية أو توقيع أو مستند رقمي وفقاً لقواعد التوثيق." },
            { ar: "إعلام رقمي", en: "Digital Media", desc: "إنتاج ونشر وتداول المحتوى الإعلامي عبر الوسائط والمنصات الرقمية، بما يشمل الصحافة والشبكات الاجتماعية." },
            { ar: "إفصاح رقمي", en: "Electronic Disclosure", desc: "إجراء قانوني يتم بموجبه الكشف عن بيانات أو مستندات رقمية بناءً على طلب قضائي أو التزام قانوني." },
            { ar: "اقتصاد افتراضي", en: "Virtual Economy", desc: "نشاط اقتصادي يتم داخل بيئات رقمية، يتضمن تبادلاً للسلع والخدمات أو العملات الرقمية." },
            { ar: "ألعاب متعددة اللاعبين", en: "Online Multiplayer Games", desc: "ألعاب رقمية تتيح تفاعل عدد كبير من المستخدمين عبر الشبكة، وقد ترتبط بمعاملات مالية." },
            { ar: "ألياف ضوئية", en: "Fiber Optics", desc: "تقنية لنقل البيانات باستخدام الضوء عبر ألياف زجاجية بسرعة عالية جداً." },
            { ar: "إمكان المساءلة", en: "Accountability", desc: "قابلية نسبة الفعل الواقع على النظام إلى مستخدم محدد من خلال وسائل التحقق وسجلات التدقيق." },
            { ar: "أمن البيانات", en: "Data Security", desc: "مجموعة التدابير التي تهدف إلى حماية البيانات من الوصول غير المصرح به أو التعديل طوال دورة حياتها." },
            { ar: "أمن الشبكات", en: "Network Security", desc: "إجراءات وحماية شبكات المعلومات من الاختراق أو التعطيل، بما يضمن استمرارية الخدمة." },
            { ar: "أمن المعلومات", en: "Information Security", desc: "نظام متكامل يهدف إلى حماية سرية المعلومات وسلامتها وتوافرها داخل النظم الرقمية." },
            { ar: "إنترنت", en: "Internet", desc: "شبكة عالمية مترابطة من شبكات الحاسوب تعتمد حزمة بروتوكولات (TCP/IP) لتمكين تبادل البيانات." }
        ];

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0, 0);
        }

        function render(items) {
            const list = document.getElementById('termsList');
            list.innerHTML = items.map(item => `
                <div class="term-card">
                    <div class="term-header" onclick="toggleTerm(this.parentElement)">
                        <span class="term-title">${item.ar}</span>
                        <i data-lucide="chevron-down" size="18"></i>
                    </div>
                    <div class="term-content">
                        <p style="color:var(--accent); font-weight:700; margin-bottom:10px;">${item.en}</p>
                        <p style="font-size:0.95rem; line-height:1.5; color:#475569;">${item.desc}</p>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function toggleTerm(selectedCard) {
            const isActive = selectedCard.classList.contains('active');
            document.querySelectorAll('.term-card').forEach(card => card.classList.remove('active'));
            if (!isActive) selectedCard.classList.add('active');
        }

        document.getElementById('searchInput').oninput = (e) => {
            const v = e.target.value.toLowerCase();
            render(dictionaryData.filter(i => i.ar.includes(v) || i.en.toLowerCase().includes(v)));
        };

        // البدء
        render(dictionaryData);
        lucide.createIcons();
    </script>
</body>
</html>
