<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قاموس قانون الإنترنت | جهاز المباحث الجنائية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #c6a334;
            --white: #ffffff;
            --bg-light: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-light);
            color: var(--primary);
        }

        .page {
            display: none;
            min-height: 100vh;
            width: 100%;
            padding: 40px 20px;
            animation: fadeIn 0.6s ease-in-out;
        }

        .page.active { display: flex; flex-direction: column; align-items: center; }

        /* الصفحة الرئيسية - تنسيق متجاوب */
        #home-page {
            background: 
                linear-gradient(rgba(10, 15, 30, 0.85), rgba(10, 15, 30, 0.85)), 
                url('11.jpg'); 
            background-size: cover;
            background-position: center top;
            color: white;
            justify-content: center;
            text-align: center;
        }

        /* تعديلات اللابتوب */
        @media (min-width: 1024px) {
            #home-page { background-attachment: fixed; background-position: center center; }
            .hero-content h1 { font-size: 4rem !important; }
        }

        /* تعديلات الهاتف */
        @media (max-width: 480px) {
            .hero-content h1 { font-size: 2.2rem !important; }
            .hero-btns { display: flex; flex-direction: column; width: 100%; align-items: center; }
            .btn { width: 85% !important; margin: 8px 0 !important; }
        }

        .hero-content h1 { font-weight: 900; color: var(--accent); margin-bottom: 15px; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .hero-content p { font-size: 1.2rem; margin-bottom: 35px; opacity: 0.9; line-height: 1.6; }

        .btn {
            padding: 16px 35px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            font-family: inherit;
            font-size: 1.1rem;
            text-decoration: none;
            display: inline-block;
        }
        .btn-main { background: var(--accent); color: var(--primary); }
        .btn-outline { background: transparent; border: 2px solid var(--accent); color: var(--accent); }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        /* القاموس */
        .container { width: 100%; max-width: 800px; padding-bottom: 80px; }
        .search-box { position: relative; margin-bottom: 25px; width: 100%; }
        #searchInput {
            width: 100%; padding: 18px 55px 18px 20px;
            border-radius: 15px; border: 2px solid #cbd5e1;
            font-family: inherit; font-size: 1.1rem; outline: none;
        }
        .search-icon { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: var(--accent); }

        .term-card { background: white; border-radius: 15px; margin-bottom: 12px; border: 1px solid #e2e8f0; overflow: hidden; }
        .term-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .term-header:hover { background: #f1f5f9; }
        .term-title { font-weight: 800; font-size: 1.1rem; }
        
        .term-content { display: none; padding: 20px; background: #fafafa; border-top: 1px dashed #e2e8f0; }
        .term-card.active .term-content { display: block; }
        .term-card.active .term-header { color: var(--accent); }

        .fixed-footer {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(15, 23, 42, 0.95); color: #94a3b8;
            text-align: center; padding: 12px; font-size: 0.85rem; z-index: 100;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <section id="home-page" class="page active">
        <div class="hero-content">
            <i data-lucide="shield-check" size="64" style="color: var(--accent); margin-bottom: 20px;"></i>
            <h1>قاموس قانون الإنترنت</h1>
            <p>دولة ليبيا - وزارة الداخلية<br>جهاز المباحث الجنائية - إدارة مكافحة جرائم تقنية المعلومات</p>
            <div class="hero-btns">
                <button class="btn btn-main" onclick="showPage('dictionary-page')">فتح القاموس</button>
                <button class="btn btn-outline" onclick="showPage('contact-page')">اتصل بنا</button>
            </div>
        </div>
    </section>

    <section id="dictionary-page" class="page">
        <div class="container">
            <h2 style="margin-bottom: 25px; text-align: center; font-weight: 900;">المصطلحات المعتمدة</h2>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="بحث سريع في المصطلحات...">
                <i data-lucide="search" class="search-icon"></i>
            </div>
            <div id="termsList"></div>
            <center><button class="btn btn-outline" style="margin-top: 30px;" onclick="showPage('home-page')">رجوع للرئيسية</button></center>
        </div>
    </section>

    <section id="contact-page" class="page">
        <div class="container" style="text-align: center; margin-top: 50px;">
            <h2 style="margin-bottom: 30px; font-weight: 900;">قنوات التواصل الرسمي</h2>
            <div style="background: white; padding: 40px; border-radius: 20px; border: 1px solid #e2e8f0;">
                <p style="margin-bottom: 15px; font-size: 1.2rem;"><strong>البريد الإلكتروني:</strong><br>info@cid.gov.ly</p>
                <hr style="margin: 20px 0; opacity: 0.2;">
                <p style="font-size: 1.2rem;"><strong>رقم الهاتف:</strong><br>021-1234567</p>
            </div>
            <button class="btn btn-main" style="margin-top: 30px;" onclick="showPage('home-page')">العودة للرئيسية</button>
        </div>
    </section>

    <div class="fixed-footer">
        جميع الحقوق محفوظة &copy; 2026 - جهاز المباحث الجنائية
    </div>

    <script>
        const dictionaryData = [
            
{ ar: "ابتكار مفتوح", en: "Open Innovation", desc: "نموذج ابتكار يعتمد على أطراف خارجية، افراداً أو مؤسسات، في تطوير الأفكار أو المنتجات عبر تعاون مفتوح. " },
{ ar: "إبداع رقمي", en: "Digital Creativity", desc: "إنتاج أعمال او محتوى إبداعي باستخدام أدوات وتقنيات رقمية، مثل التصميم الرقمي، المؤثرات، أو البرمجة الإبداعية." },
{ ar: "إتاحة المعلومات", en: "Availability", desc: "أحد عناصر أمن المعلومات، ويعني ضمان بقاء البيانات أو الخدمات الرقمية قابلة للوصول والاستخدام عند الحاجة. " },
{ ar: "إثبات رقمي", en: "Digital Evidence", desc: "كل معلومة أو أثر ذي طبيعة رقمية يُستخلص من أجهزة أو نظم معلومات، ويصلح للاحتجاج به في الإجراءات القضائية وفق قواعد قبول الأدلة وسلامة المصدر. " },
{ ar: "إثر رقمي", en: "Digital Trace", desc: "(: بيانات أو علامات تخلّفها الأنشطة الرقمية للمستخدمين أو الأجهزة أو النظم في البيئة الرقمية ويمكن الاستدلال بها فنياً وقد تُستخدم قانونياً في التحقيق والإثبات. " },
{ ar: "اجتماعات افتراضية", en: "Virtual Meetings", desc: "اجتماعات تُعقد عن بُعد عبر منصات رقمية تتيح تواصلاً متزامناً بالصوت أو الصوت والصورة، مع إمكان تبادل الملفات وإدارة الجلسة رقمياً." },
{ ar: "إخفاء الهوية", en: "Anonymity", desc: "حالة يتم فيها استخدام الوسائط الرقمية دون الكشف عن الهوية الحقيقية للمستخدم، سواء بوسائل تقنية أو قانونية." },
{ ar: "أخلاقيات رقمية", en: "Digital Ethics", desc: "مجموعة المبادئ والمعايير الأخلاقية التي تضبط سلوك الأفراد والمؤسسات عند استخدام التقنيات الرقمية بما يشمل احترام الخصوصية والشفافية وعدم الإضرار. " },
{ ar: "أداة مراقبة النشاط", en: "Activity Monitor", desc: "): أداة أو برنامج يُستخدم لتتبع أنشطة المستخدم على الجهاز أو الشبكة، مثل الشاشات المفتوحة، وضربات المفاتيح، وسجل التصفح، والتطبيقات المستخدمة. وقد يثير استخدامها مسائل قانونية تتصل بخصوصية العاملين وحدود الرقابة داخل بيئة العمل." },
{ ar: "أدلة مقبولة قضائيًا", en: "Admissible Evidence", desc: ")) أدلة تستوفي الشروط القانونية والإجرائية اللازمة لقبولها أمام القضاء والاحتجاج بها، بحسب قواعد الإثبات المعمول بها. ويشمل ذلك، في البيئة الرقمية، سلامة جمع الدليل، ومشروعية الحصول عليه، وإمكان التحقق من مصدره ومضمونه.  " },
{ ar: "إدمان رقمي", en: "Digital Addiction", desc: "نمط استخدام مفرط أو متكرر للتقنيات الرقمية يفضي إلى آثار متعددة اغلبها سلبية ملحوظة على الأداء أو العلاقات الاجتماعية أو إدارة الوقت، مثل تراجع الإنتاجية، العزلة، أو ضعف التحكم في مدة الاستخدام." },
{ ar: "أدوات رقمية", en: "Digital Tools", desc: "وسائل أو برامج أو أجهزة أو تطبيقات تُستخدم في إنشاء أو معالجة أو تخزين أو نقل أو تحليل البيانات في البيئة الرقمية، وقد يترتب على استخدامها آثار قانونية تتعلق بالمسؤولية أو الخصوصية أو الإثبات. " },
{ ar: "إذن الوصول", en: "Access Rights", desc: "صلاحيات تُمنح للمستخدم تمكّنه من الوصول إلى مورد رقمي معين أو استعماله، مثل ملف أو قاعدة بيانات أو خدمة، في حدود ما يقرره النظام من قراءة أو تعديل أو تنفيذ أو غير ذلك من أوجه الاستخدام." },
{ ar: "أرشفة", en: "Archive", desc: ")) حفظ منظم للسجلات أو المواد الرقمية غير الجارية في وسائط مخصصة للاحتفاظ الطويل الأمد، بما يضمن إمكان الرجوع إليها والاستفادة منها عند الحاجة الإدارية أو القانونية أو القضائية.  " },
{ ar: "أرشفة فردية", en: "Individual Archiving", desc: ")) احتفاظ الشخص أو الجهة بنسخ منظمة من الرسائل أو المستندات أو المواد الرقمية ذات الصلة بنشاطه أو حقوقه أو التزاماته، بقصد الرجوع إليها في الإثبات أو التوثيق أو الدفاع عند النزاع.  " },
{ ar: "أرقام تعريف ملفات تعريف الارتباط", en: "Cookie IDs", desc: ")): معرّفات رقمية تُخزَّن في متصفح المستخدم ضمن ملفات تعريف الارتباط لتمييز الجلسة أو الجهاز أو تفضيلات الاستخدام. وتشبه من حيث الوظيفة “الرموز الشريطية” أو أرقام التعريف الإدارية التي لا معنى مباشراً لها للمستخدم، لكنها ذات قيمة لمقدمي الخدمات في تجميع البيانات وقياس الاستجابة وتخصيص المحتوى. وقد تُستخدم كذلك في التتبع الإعلاني، بما يثير مسائل الخصوصية والشفافية واشتراط الموافقة وفقاً للأنظمة ذات الصلة. " },
{ ar: "استبعاد رقمي", en: "Digital Exclusion", desc: "حرمان بعض الأفراد أو الفئات من النفاذ إلى الخدمات أو المهارات الرقمية أو الاستفادة منها، بما يترتب عليه آثار اجتماعية واقتصادية وقانونية. " },
{ ar: "استضافة", en: "Hosting", desc: "خدمة تمكّن من إتاحة موقع أو تطبيق أو محتوى رقمي عبر الإنترنت، وذلك بتخزينه على خادم متصل بالشبكة وإدارته فنياً بما يضمن الوصول إليه. " },
{ ar: "استيثاق", en: "Authentication", desc: ")): عملية التحقق من هوية المستخدم أو الجهة التي تطلب النفاذ إلى النظام أو البيانات أو الخدمات الرقمية، قبل منحها حق الدخول أو الاستخدام، وذلك بوسائل مثل كلمات المرور أو البطاقات أو القياسات الحيوية." },
{ ar: "إسناد الهجوم الرقمي", en: "Attribution", desc: ")): عملية فنية وقانونية تهدف إلى تحديد الجهة المسؤولة عن فعل ضار وقع عبر وسائط رقمية، استناداَ إلى مؤشرات تقنية وأدلة تحقيق." },
{ ar: "إشعار أمني", en: "Advisory", desc: ")) إخطار معلوماتي يتضمن بيانًا بثغرة أو خطر أو خلل أو إجراء تصحيحي، ويصدر غالبًا بعد ظهور الواقعة أو متابعة لتنبيه سابق، من غير أن يبلغ بالضرورة درجة الاستعجال التي تميز الإنذار الأمني.  " },
{ ar: "أصول رقمية", en: "Digital Assets", desc: "موجودات ذات قيمة اقتصادية أو قانونية في البيئة الرقمية، مثل قواعد البيانات، البرمجيات، الحقوق الرقمية أو الأصول المشفرة بحسب طبيعة النظام القانوني المنظم لها. " },
{ ar: "اعتماد رقمي", en: "Digital Certification", desc: ")): إجراء قانوني أو تقني يمنح مصادقة رسمية على هوية او توقيع أو مستند رقمي، وفقاً لقواعد التوثيق المعتمدة. " },
{ ar: "إعلام رقمي", en: "Digital Media", desc: "إنتاج ونشر وتداول المحتوى الإعلامي عبر الوسائط والمنصات الرقمية، بما يشمل الصحافة الرقمية، الشبكات الاجتماعية، والبث عبر الإنترنت." },
{ ar: "إفصاح رقمي", en: "Electronic Disclosure", desc: "إجراء قانوني يتم بموجبه الكشف عن بيانات أو مستندات رقمية بناءً على طلب قضائي أو التزام قانوني." },
{ ar: "اقتصاد افتراضي", en: "Virtual Economy", desc: "نشاط اقتصادي يتم داخل بيئات رقمية أو منصات افتراضية، يتضمن تبادلاً للسلع والخدمات أو العملات الرقمية أو نقاط القيمة وفق قواعد المنصة." },
{ ar: "ألعاب متعددة اللاعبين عبر الإنترنت", en: "Online Multiplayer Games", desc: "ألعاب رقمية تتيح تفاعل عدد كبير من المستخدمين عبر الشبكة ضمن بيئة مشتركة، وقد ترتبط بمعاملات رقمية أو اقتصاد افتراضي داخل اللعبة. " },
{ ar: "ألياف ضوئية", en: "Fiber Optics", desc: "تقنية لنقل البيانات باستخدام الضوء عبر ألياف زجاجية أو بلاستيكية بسرعة عالية. " },
{ ar: "إمكان المساءلة", en: "Accountability", desc: ") ): قابلية نسبة الفعل أو الاستخدام الواقع على النظام أو البيانات أو الموارد الرقمية إلى مستخدم محدد، من خلال وسائل التحقق وسجلات التدقيق، بما يسمح بتتبع المسؤولية وإثباتها عند الحاجة." },
{ ar: "أمن البيانات", en: "Data Security", desc: "مجموعة التدابير الفنية والتنظيمية التي تهدف إلى حماية البيانات من الوصول غير المصرح به أو التعديل أو الإتلاف أو الفقدان طوال دورة الحياة. " },
{ ar: "أمن الشبكات", en: "Network Security", desc: ") ): إجراءات وتقنيات لحماية شبكات المعلومات من الاختراق أو التعطيل أو إساءة الاستخدام، بما يضمن استمرارية الخدمة وسلامة البيانات." },
{ ar: "أمن المعلومات", en: "Information Security", desc: ")): نظام متكامل من السياسات والإجراءات يهدف إلى حماية سرية المعلومات وسلامتها وتوافرها داخل النظم الرقمية والمعلوماتية." },
{ ar: "إنترنت", en: "Internet", desc: "شبكة عالمية مترابطة من شبكات الحاسوب تعتمد حزمة بروتوكولات الإنترنت (TCP/IP) لتمكين تبادل البيانات والخدمات عبر الحدود. " },
{ ar: "إنترنت الأشياء", en: "Internet of Things", desc: "شبكة من أجهزة مادية مزودة بحساسات وبرمجيات واتصال شبكي، تُمكّنها من جمع البيانات وتبادلها وتنفيذ وظائف تلقائية." },
{ ar: "إنترنت فضائي", en: "Satellite Internet", desc: ")): خدمة اتصال بالإنترنت تعتمد على الأقمار الصناعية لتوفير النفاذ في المناطق التي تفتقر إلى البنية الأرضية." },
{ ar: "انتهاك البيانات", en: "Data Breach", desc: "واقعة وصول غير مصرح به إلى بيانات رقمية أو كشفها أو تسريبها، بما يشكل إخلالاً بأمن المعلومات أو الخصوصية." },
{ ar: "إنذار أمني", en: "Alert", desc: ")): رسالة عاجلة تتعلق بخطر قد يهدد النظم أو البيانات أو البنية التقنية، وتستوجب تحركًا سريعًا بحسب درجة الخطورة وطبيعة التهديد، سواء من المسؤول التقني أو من المستخدم بحسب الأحوال.  " },
{ ar: "أوراق الأنماط المتتالية", en: "Cascading Style Sheets (CSS)", desc: "لغة توصيف تتحكم في تنسيق وعرض صفحات الويب، وتعمل عادة CSS مع HTML." },
{ ar: "اختراق أخلاقي", en: "Ethical Hacking", desc: ")) نشاط تقني مشروع يهدف إلى اختبار الأنظمة أو الشبكات أو التطبيقات لكشف الثغرات ونقاط الضعف فيها بإذن من الجهة المالكة، بقصد تحسين الحماية لا الإضرار." },
{ ar: "اختراق رقمي", en: "Cyber Intrusion", desc: ")): دخول غير مشروع إلى نظام أو شبكة أو خدمة رقمية، أو محاولة ذلك، عبر استغلال ثغرة أو وسيلة تقنية تُمكّن من النفاذ أو العبث أو التعطيل." },
{ ar: "انتحال رقمي", en: "Digital Impersonation", desc: ")): اتخاذ هوية رقمية أو صفة إلكترونية تخص الغير دون حق، بقصد التضليل أو الانتفاع أو الإضرار أو الوصول إلى بيانات أو خدمات أو مزايا." },
{ ar: "أذونات رقمية", en: "Digital Permissions", desc: ")): صلاحيات أو مستويات وصول تمنح لمستخدم أو تطبيق أو نظام داخل البيئة الرقمية، وتحدد حدود ما يجوز له الاطلاع عليه أو استخدامه أو تعديله." },
{ ar: "أذونات قانونية", en: "Legal Authorizations", desc: ")): موافقات أو صلاحيات تستند إلى نص قانوني أو قرار تنظيمي أو سند مشروع، وتخول القيام بفعل رقمي أو الاطلاع على بيانات أو مباشرة إجراء معين." },
{ ar: "أذونات شخصية", en: "Personal Permissions", desc: ")): موافقات يمنحها الشخص بشأن بياناته أو حسابه أو جهازه أو تطبيقاته، بما يحدد نطاق الاستخدام أو النفاذ أو المعالجة." },
{ ar: "أذونات التطبيقات", en: "Application Permissions", desc: ")): صلاحيات تُمنح للتطبيقات الرقمية للوصول إلى وظائف الجهاز أو بياناته، مثل الموقع الجغرافي أو الكاميرا أو الميكروفون أو جهات الاتصال." },
{ ar: "أذونات البيانات", en: "Data Permissions", desc: ")): حدود قانونية أو تقنية أو تعاقدية تحدد من يملك حق الوصول إلى البيانات أو استخدامها أو معالجتها أو مشاركتها." },
{ ar: "أعمال تجارية إلكترونية", en: "Electronic Business Activities", desc: ")): أنشطة تجارية تمارس عبر الوسائط أو المنصات الإلكترونية، وتشمل عرض السلع أو الخدمات والتفاوض عليها وبيعها وتقديمها وتسويتها." },
{ ar: "أعمال رقمية", en: "Digital Business", desc: ")): أنشطة اقتصادية أو مهنية أو خدمية تعتمد في إنشائها أو تشغيلها أو إدارتها على الأدوات أو المنصات أو البنى الرقمية." },
{ ar: "أعمال قانونية رقمية", en: "Digital Legal Operations", desc: ")): أعمال ذات طبيعة قانونية تُنجز أو تُدار أو تُحفظ أو تُتابع بصيغة رقمية، مثل التعاقد الإلكتروني، والتوثيق، وإدارة الملفات القانونية." },
{ ar: "أرشفة قانونية", en: "Legal Archiving", desc: ")): تنظيم وحفظ المستندات أو السجلات أو الوقائع ذات القيمة القانونية على نحو يضمن سلامتها وإمكان الرجوع إليها والاحتجاج بها عند الحاجة." },
{ ar: "أرشيف إلكتروني", en: "Electronic Archive", desc: ")): نظام أو مستودع لحفظ الوثائق أو السجلات أو المحتوى بصيغة إلكترونية على نحو منظم ييسر استرجاعه وإدارته." },
{ ar: "أرشيف رقمي", en: "Digital Archive", desc: ")): مجموعة منظمة من السجلات أو الوثائق أو المحتوى المحفوظ بصيغة رقمية لأغراض الحفظ أو الإدارة أو التوثيق أو الإثبات." },
{ ar: "أحكام قضائية إلكترونية", en: "Electronic Judicial Decisions", desc: ")): أحكام أو قرارات تصدرها جهة قضائية أو تُبلغ أو تُنشر أو تُدار عبر وسائط إلكترونية وفقاً للإطار الإجرائي المعمول به." },
{ ar: "أمن بنكي رقمي", en: "Digital Banking Security", desc: ")): مجموعة التدابير القانونية والتنظيمية والتقنية الهادفة إلى حماية الحسابات والمعاملات والخدمات المصرفية الرقمية من الاختراق أو الاحتيال أو سوء الاستخدام." },
{ ar: "أمن شخصي رقمي", en: "Personal Digital Security", desc: "تدابير الحماية التي يتخذها الفرد لصون حساباته وأجهزته وبياناته واتصالاته من التهديدات أو الاختراقات أو الاستغلال غير المشروع." },
{ ar: "أمن افتراضي وطني", en: "National Cybersecurity", desc: ")): منظومة السياسات والتدابير والمؤسسات التي تعتمدها الدولة لحماية بنيتها الرقمية ومرافقها الحيوية وبياناتها ومجتمعها من المخاطر والتهديدات الافتراضية." },
{ ar: "أنشطة رقمية غير قانونية", en: "Illegal Digital Activities", desc: ")): أفعال أو ممارسات تقع في البيئة الرقمية بالمخالفة للقانون، سواء استهدفت الأنظمة أو البيانات أو الأشخاص أو المعاملات." },
{ ar: "اعتداء على الخصوصية", en: "Privacy Violation", desc: ")): مساس غير مشروع بحرمة الحياة الخاصة أو البيانات الشخصية أو الاتصالات أو المجال الشخصي للفرد داخل البيئة الرقمية أو خارجها." },
{ ar: "اعتراض رقمي", en: "Digital Interception", desc: ")): التقاط أو مراقبة أو الحصول على بيانات أو اتصالات رقمية أثناء انتقالها أو تداولها دون سند مشروع أو خارج الحدود المقررة قانوناً." },
{ ar: "إجراءات قانونية رقمية", en: "Digital Legal Procedures", desc: ")): خطوات أو معاملات أو ممارسات ذات طابع قانوني تُباشر أو تُدار أو تُوثق عبر الوسائط أو المنصات الرقمية." },
{ ar: "إدارة قانونية رقمية", en: "Digital Legal Management", desc: ")): تنظيم الأعمال والملفات والإجراءات والالتزامات القانونية باستخدام نظم أو منصات أو أدوات رقمية." },
{ ar: "إدارة رقمية للبيانات", en: "Digital Data Management", desc: ")): تنظيم البيانات الرقمية وحفظها وتصنيفها والوصول إليها وتحديثها وحذفها وفق سياسات ومعايير محددة. " },
{ ar: "باب خلفي", en: "Backdoor", desc: ")): وظيفة أو منفذ خفي يُدرج في برنامج أو نظام، ويمنح صاحبه أو من يكتشفه صلاحيات أو وصولًا غير متاح للمستخدم العادي، وقد يُستغل لتجاوز الضوابط الأمنية أو الدخول غير المصرح به. " },
{ ar: "بت", en: "Bit", desc: "أصغر وحدة لتمثيل البيانات رقميًا، وتكون قيمتها صفرًا أو واحدًا، وتُبنى منها سائر البيانات والملفات والعمليات الحاسوبية.  " },
{ ar: "بث حي", en: "Live Streaming", desc: ")): نقل الصوت أو الفيديو عبر الإنترنت في الوقت الفعلي للمشاهدة أو الاستماع المتزامن." },
{ ar: "برمجيات خبيثة", en: "Malware", desc: "برمجيات تُصمم لإحداث ضرر أو تعطيل أو وصول غير مصرح به إلى الأنظمة والبيانات." },
{ ar: "برمجيات الفدية", en: "Ransomware", desc: ") ): برمجيات خبيثة تُشفّر البيانات أو تقيد الوصول إليها مقابل طلب فدية." },
{ ar: "برمجيات مفتوحة المصدر", en: "Open Source Software", desc: ")): برمجيات يُتاح كودها المصدري وفق تراخيص تسمح بالاستخدام والتعديل وإعادة التوزيع ضمن شروط محددة, بما يرتب آثاراً قانونية تتعلق بالترخيص والملكية الفكرية والامتثال. " },
{ ar: "برنامج حظر السلوك", en: "Behavior Blocker", desc: "أداة أمنية تراقب السلوك غير المعتاد أو الخطر في النظام، ولا تقتصر على التنبيه إليه، بل قد تمنع تنفيذ العملية المشبوهة أو تقيّدها.  " },
{ ar: "بروتوكول آمن", en: "HTTPS", desc: "نسخة مؤمنة من HTTP تستخدم تشفير TLS لحماية سرية البيانات وسلامتها أثناء النقل بين المتصفح والخادم." },
{ ar: "بروتوكول الإنترنت", en: "Internet Protocol, IP", desc: ")) إطار بروتوكولي لتنظيم عنونة الحزم وتوجيهها بين الشبكات، ويعمل ضمن حزمة بروتوكولات الإنترنت التي تتضمن معاملات تقنية ثابتة مثل أرقام البروتكولات وأرقام المنافذ وأرقام النظام الذاتي ومعرفات إدارة المعلومات.   " },
{ ar: "بروتوكول الإنترنت الإصدار السادس", en: "IPv6", desc: ") ): أحدث إصدار من بروتوكول الإنترنت، يوفر مجالاً واسعاً للعناوين مقارنة بـIPv4   ويدعم توسع الشبكات وإنترنت الأشياء." },
{ ar: "بروتوكول النظام الحزمي", en: "Transmission Control Protocol/Internet Protocol", desc: "): حزمة بروتوكولات تُنظم نقل البيانات وتوجيهها بين الشبكات على الإنترنت, وتعمل وفق مبدأ تبديل الحزم, حيث يضمن TCP سلامة الإرسال, ويتولى IP العنونة والتوجيه. " },
{ ar: "بروتوكول لاسلكي", en: "Wireless Protocol", desc: ") ): معيار اتصال ينظم نقل البيانات عبر الشبكات اللاسلكية، مثل Wi-Fi وBluetooth.." },
{ ar: "بروتوكول التحكم بالإرسال", en: "TCP", desc: ")): بروتوكول يضمن نقل البيانات بصورة موثوقة عبر تقسيمها إلى حزم، والتحقق من وصولها، وإعادة الإرسال عند فقدانها." },
{ ar: "بروتوكول مخطط البيانات", en: "UDP", desc: "بروتوكول نقل سريع وخفيف، لا يضمن التسليم أو الترتيب مثل TCP, ويُستخدم في تطبيقات تتطلب زمناً أقل. " },
{ ar: "بروتوكول نقل البريد البسيط", en: "SMTP", desc: ") ): معيار لإرسال البريد الإلكتروني بين الخوادم وعبر الشبكات." },
{ ar: "بروتوكول نقل الملفات", en: "FTP", desc: ") ): معيار لنقل الملفات بين عميل وخادم عبر الشبكات، ويُستخدم في بيئات إدارية وتقنية محددة." },
{ ar: "بروتوكول نقل النص الفائق", en: "HTTP", desc: "بروتوكول لتبادل محتوى الويب بين المتصفح والخادم، وهو الأساس في طلب صفحات الويب واسترجاعها." },
{ ar: "بروتوكول الوصول لرسائل الإنترنت", en: "IMAP", desc: "): معيار يتيح الوصول إلى البريد الإلكتروني وإدارته على الخادم دون الحاجة إلى تنزيله كاملاً على جهاز المستخدم." },
{ ar: "بروتوكولات الإنترنت ومعاملاتها الفنية", en: "Internet Protocol Suite Parameters", desc: "(Internet Protocol Suite     Parameters) مجموعة معايير وبروتوكولات الإنترنت كما تعتمدها الهيئات الفنية المختصة، وما يرتبط بها من معاملات تقنية مثل أرقام البروتوكولات والمنافذ والمعرفات اللازمة لتشغيل الشبكات وتوافقها." },
{ ar: "بريد إلكتروني", en: "E-mail", desc: ") ): وسيلة لتبادل رسائل رقمية عبر الشبكات باستخدام عناوين بريدية وبروتوكولات إرسال واستقبال, وتُعد من أقدم خدمات الإنترنت وأكثرها استخداماً. " },
{ ar: "بصمات حيوية", en: "Biometrics", desc: ")): وسائل للتحقق من الهوية تعتمد خصائص جسدية أو سلوكية مميزة للشخص، مثل بصمة الإصبع، أو قزحية العين، أو الوجه، أو الصوت، وتُستخدم في التحكم في الوصول وتعزيز الاستيثاق.  " },
{ ar: "بصمة الجهاز، أو بصمة المتصفح", en: "Device Fingerprint, Browser Fingerprinting", desc: "): خصائص تقنية تُجمع من الجهاز أو المتصفح لتمييزه، وقد تُستخدم في التعقب أو مكافحة الاحتيال أو الإسناد الفني، بما يثير مسائل الخصوصية. " },
{ ar: "بصمة رقمية", en: "Digital Fingerprint", desc: ")): قيمة تجزئة، أو بصمة رقمية، تميز البيانات تمييزاً فريداً، ويؤدي تغير بسيط في البيانات إلى تغير كامل في البصمة، وتُستخدم في الإثبات الرقمي وسلامة الملفات." },
{ ar: "بلوتوث", en: "Bluetooth", desc: ") ): تقنية اتصال لاسلكي قصير المدى تتيح ربط الأجهزة القريبة وتبادل البيانات بينها، وتُستخدم في الهواتف والحواسيب والملحقات الذكية وغيرها من الأجهزة الرقمية.  " },
{ ar: "بلوك تشين", en: "Block chain", desc: ")): سجل رقمي موزع لتوثيق المعاملات على هيئة كتل مترابطة، بما يصعب العبث به ويُستخدم في تطبيقات مثل الأصول المشفرة والعقود الذكية." },
{ ar: "بنية تحتية للعالم الافتراضي", en: "Cyber Infrastructure", desc: "موارد الاتصالات والتخزين والحوسبة التي تقوم عليها البيانات ونظم المعلومات والخدمات الرقمية." },
{ ar: "بوابة إلكترونية", en: "Portal", desc: ")): واجهة رقمية تجمع خدمات أو معلومات متعددة وتتيح للمستخدم الوصول إليها من نقطة واحدة." },
{ ar: "بودكاست", en: "Podcast", desc: "محتوى صوتي، أو صوتي مرئي، يُنشر على الإنترنت بحيث يمكن الاشتراك فيه وتحميله أو الاستماع إليه عند الطلب." },
{ ar: "بوت نت", en: "Botnet", desc: ")): شبكة من أجهزة مخترقة تُدار عن بعد لتنفيذ هجمات مثل حجب الخدمة أو إرسال الرسائل المزعجة." },
{ ar: "بيئات افتراضية", en: "Virtual Environments", desc: "فضاءات رقمية يمكن للمستخدمين استكشافها والتفاعل داخلها، وقد ترتبط بتطبيقات تعليمية أو ترفيهية أو مهنية." },
{ ar: "بيوس", en: "BIOS", desc: ":(BIOS) نظام أساسي مخزن في الجهاز، يتولى بدء تشغيل الحاسوب وتمكين نظام التشغيل من التعامل مع المكونات المادية الأساسية، مثل القرص ولوحة المفاتيح وغيرها من الأجهزة الطرفية.  " },
{ ar: "تأهيل افتراضي", en: "Virtual Rehabilitation", desc: ")): برامج تأهيلية تستخدم تقنيات الواقع الافتراضي لدعم التدريب أو الاسترجاع الوظيفي أو التأهيل." },
{ ar: "تتبّع رقمي", en: "Digital Tracking", desc: ")): جمع وربط بيانات عن نشاط المستخدم عبر المواقع أو التطبيقات لأغراض مثل القياس أو التخصيص أو الإعلان، بما يثير مسائل الخصوصية والموافقة." },
{ ar: "تجارة افتراضية", en: "Virtual Commerce", desc: ")): ممارسة إجراءات شراء وبيع السلع والخدمات داخل العوالم الافتراضية، وقد ترتبط بمدفوعات رقمية وشروط خدمة ومسؤوليات تعاقدية." },
{ ar: "تجسّس رقمي", en: "Digital Espionage", desc: ")): جمع معلومات أو بيانات رقمية بطرق غير مشروعة، غالباً عبر اختراق أو برمجيات خبيثة أو استغلال ثغرات، وقد يرتبط بمسؤولية جنائية أو دولية بحسب السياق." },
{ ar: "تحقق ثنائي", en: "Two-Factor Authentication, 2FA", desc: ")): آلية تحقق تعتمد عاملين لإثبات هوية المستخدم، مثل كلمة مرور مع رمز مؤقت أو وسيلة مماثلة." },
{ ar: "تحقق متعدد العوامل", en: "Multi-Factor Authentication, MFA", desc: ")): آلية تحقق تعتمد عاملين أو أكثر لإثبات هوية المستخدم، للحد من الاستيلاء على الحسابات وتعزيز أمن النفاذ." },
{ ar: "تخزين إلكتروني", en: "Electronic Storage", desc: ")): حفظ الاتصالات الإلكترونية بصورة مؤقتة أو وسيطة لغايات الإرسال أو التسليم، مثل احتفاظ مزود الخدمة برسالة حتى يقوم المرسل إليه بتنزيلها." },
{ ar: "تخزين سحابي", en: "Cloud Storage", desc: ")): نموذج لتخزين البيانات عبر الإنترنت على خوادم بعيدة بدلاً من وسائط التخزين المحلية، مع إمكان الوصول والإدارة عن بعد." },
{ ar: "تخزين مؤقت", en: "Caching", desc: ")): عملية حفظ بيانات أو محتوى بصورة مؤقتة لتسريع الطلبات المستقبلية وتقليل زمن الاستجابة." },
{ ar: "ترفيه افتراضي", en: "Virtual Entertainment", desc: ")): أنشطة ترفيهية تقام في بيئات افتراضية أو منصات رقمية، مثل الفعاليات الافتراضية والألعاب والعروض." },
{ ar: "تسريب بيانات", en: "Data Leak", desc: ")): خروج بيانات من نطاقها المصرح به إلى أطراف غير مخولة، بسبب خطأ أو إعدادات أو ثغرة أو سلوك داخلي، وقد يشكل إخلالاً بالخصوصية أو الأمن." },
{ ar: "تسويق رقمي", en: "Digital Marketing", desc: ")): استخدام القنوات والمنصات الرقمية للترويج للسلع والخدمات، وقد يرتبط بجمع بيانات قياس وتخصيص وتتبّع." },
{ ar: "تشفير", en: "Encryption", desc: ")): عملية تحويل المعلومات إلى صيغة غير مقروءة إلا بمفتاح أو آلية فك محددة، لحماية السرية ومنع الوصول غير المصرح به." },
{ ar: "تشفير طبقة النقل", en: "Transport Layer Security, TLS", desc: ")): بروتوكول تشفير يحمي البيانات أثناء نقلها بين العميل والخادم، ويستخدم مثلاً مع HTTPS لضمان السرية والسلامة." },
{ ar: "تشفير طرفي", en: "End-to-End Encryption, E2EE", desc: ")): نمط تشفير يضمن أن محتوى الاتصال لا يمكن قراءته إلا من أطراف الاتصال، دون تمكين الوسيط من الاطلاع على المحتوى." },
{ ar: "تصديق هوية", en: "Authentication", desc: ")): إجراءات تقنية للتأكد من هوية المستخدم أو النظام، مثل كلمات المرور أو الشهادات الرقمية أو الرموز المؤقتة." },
{ ar: "تصيّد احتيالي", en: "Phishing", desc: ")): أسلوب احتيالي يعتمد رسائل أو مواقع مزيفة لخداع المستخدم والحصول على بياناته أو دفعه لتنفيذ فعل ضار." },
{ ar: "تفاعل في الزمن الحقيقي", en: "Real-time Interaction", desc: ")): قدرة المستخدمين على التفاعل والاستجابة فورياً داخل خدمة رقمية أو بيئة افتراضية." },
{ ar: "تعلم إلكتروني", en: "E-learning", desc: ")): استخدام التقنيات الرقمية في التعليم وإدارة المحتوى والتفاعل والتقييم عبر منصات إلكترونية." },
{ ar: "تعليم افتراضي", en: "Virtual Education", desc: ")): استخدام بيئات أو منصات افتراضية في العملية التعليمية، مع إمكان التفاعل وإدارة الجلسات والمواد رقمياً." },
{ ar: "تفويض وصول", en: "Authorization", desc: ")): منح صلاحيات محددة لمستخدم أو نظام للوصول إلى موارد رقمية بعد تحقق الهوية، وفق سياسات التحكم بالوصول." },
{ ar: "تقنيات الويب الدلالي", en: "Semantic Web", desc: ")): امتداد للويب يهدف لجعل المحتوى والبيانات مفهومة وقابلة للمعالجة بواسطة الآلات عبر توصيف المعاني والعلاقات." },
{ ar: "تقنية تبديل الحزم", en: "Packet Switching", desc: ")): أسلوب لنقل البيانات عبر تجزئتها إلى \"حزم\" صغيرة قد تسلك مسارات مختلفة عبر الشبكة، ثم يعاد تجميعها لدى الجهة المستقبلة." },
{ ar: "تقنية متقاربة", en: "Convergence", desc: ")): دمج التقنيات المختلفة مثل الحوسبة والاتصالات والبث في أنظمة متكاملة ضمن منصة واحدة." },
{ ar: "تكنولوجيا تحويلية", en: "Transformative Technology", desc: ")): تقنيات تحدث تحولاً في أساليب العمل والخدمات، مثل الذكاء الاصطناعي والأنظمة الذاتية، بما يغير طبيعة المخاطر والمسؤوليات." },
{ ar: "تهديد", en: "Threat", desc: ":(Threat) احتمال تعرّض البيانات أو النظم أو موارد المعلومات للمساس العرضي أو العمدي بأهداف الحماية الأساسية، مثل السرية، والسلامة، والإتاحة، وإمكان المساءلة. وقد يؤدي وجود الثغرات إلى زيادة احتمال تحقق التهديد ووقوع الضرر.    " },
{ ar: "تهديد منظم", en: "Structured Threat", desc: ":(Structured Threat) تهديد يقوم على هجوم مخطط ومنهجي يستهدف نظامًا أو موردًا معلوماتيًا محددًا بقصد اختراقه أو الإضرار به أو تعطيل خدماته، وقد يتم بوسائل مثل الاختراق أو البرمجيات الخبيثة أو الحرب الإلكترونية.    " },
{ ar: "تهديد غير منظم", en: "Unstructured Threat", desc: ")): تهديد ينشأ عن محاولات اختراق أو أفعال غير مترابطة أو عشوائية تستغل ثغرات النظم، وقد تؤدي إلى المساس بعملها أو تعطيلها دون أن تقوم بالضرورة على تخطيط منهجي موجه إلى هدف بعينه." },
{ ar: "تمكين رقمي", en: "Digital Empowerment", desc: ")): بناء القدرات وتزويد الأفراد والمؤسسات بالمهارات وإتاحة الوصول للتقنيات الرقمية بما يدعم الاستفادة والمشاركة." },
{ ar: "تنزيل", en: "Download", desc: ")): نقل بيانات أو ملفات من خادم أو منصة إلى جهاز المستخدم، وقد تترتب عليه آثار قانونية بحسب طبيعة المحتوى أو مصدره أو الغرض منه." },
{ ar: "توثيق رقمي", en: "Digital Documentation", desc: ")): تسجيل الأحداث والوقائع وحفظها في صيغ رقمية على نحو يسمح بالرجوع إليها وإدارتها." },
{ ar: "توقيع إلكتروني", en: "Electronic Signature", desc: ")): بيانات أو وسيلة إلكترونية تُلحق بمستند رقمي للدلالة على موافقة الموقّع أو نسبته إليه، وفق الإطار القانوني المنظم للتوقيع والتوثيق." },
{ ar: "ثبات الدليل", en: "Evidence Stability", desc: "حالة استقرار الدليل الرقمي بما يضمن عدم تأثره بالعوامل الخارجية أو التحلل التقني قبل تقديمه إلى الجهة المختصة.  " },
{ ar: "ثبوت رقمي", en: "Digital Verification", desc: ")): إجراءات أو وسائل تقنية للتحقق من صحة معلومة أو هوية أو مستند رقمي، وقد ترتبط بالتوثيق والتوقيع والتحقق من السلامة." },
{ ar: "ثبوتية التوقيع", en: "Signature Authenticity", desc: "))ظ: تحقق فني يثبت أن التوقيع الإلكتروني المنسوب إلى شخص معين صادر عنه فعلاً، ولم يتعرض للتزوير أو العبث.  " },
{ ar: "ثبوتية الرسالة", en: "Message Provenance", desc: ")): أدلة تقنية تؤكد أن الرسالة الرقمية صدرت من الحساب المنسوب إليه فعلاً، وفي التوقيت المشار إليه.  " },
{ ar: "ثبوتية الزمن", en: "Timestamp Authenticity", desc: "تحقق فني يثبت صحة أوقات إنشاء الملف أو تعديله أو إرساله، ويكشف ما إذا كان قد جرى التلاعب بالطوابع الزمنية.  " },
{ ar: "ثبوتية المصدر", en: "Provenance", desc: "(Provenance): سجل يبيّن أصل الدليل الرقمي ومسار تداوله وتطوره منذ إنشائه، بما يساعد على التحقق من عدم زرع البيانات أو إدخالها لاحقاً.  " },
{ ar: "ثقافة افتراضية", en: "Virtual Culture", desc: ")): عادات وسلوكيات وقيم تتشكل داخل المجتمعات الافتراضية عبر المنصات الرقمية، وتؤثر في أنماط التفاعل والهوية والعلاقات داخل البيئة الرقمية." },
{ ar: "ثقافة أمنية", en: "Security Culture", desc: ")): ممارسات وقيم وسلوكيات داخل مؤسسة أو مجتمع تعزز الالتزام بالأمن الرقمي، مثل الوعي بالمخاطر والامتثال للسياسات وتجنب التصيد." },
{ ar: "ثقة رقمية", en: "Digital Trust", desc: ")): درجة اعتماد المستخدمين أو الجهات على خدمة أو نظام رقمي من حيث الأمان والموثوقية وسلامة البيانات والامتثال، بما ينعكس على التعاملات والمسؤوليات القانونية." },
{ ar: "ثقة الشهادة", en: "Certificate Trust", desc: ") ): درجة الاعتماد على الشهادة الرقمية في التحقق من هوية الموقع أو الجهة المصدّقة، بما يؤثر في سلامة الاتصال وأمن التعامل." },
{ ar: "ثغرة أمنية", en: "Security Vulnerability", desc: ")): خلل أو ضعف في نظام أو برنامج أو إعدادات أمنية يمكن استغلاله للوصول غير المصرح به أو تعطيل الخدمة أو العبث بالبيانات." },
{ ar: "ثغرة إجرائية", en: "Procedural Flaw", desc: ")): قصور في السياسات أو الإجراءات التنظيمية المعتمدة داخل الجهة، من شأنه تسهيل وقوع الاختراق أو إساءة الاستخدام.  " },
{ ar: "ثغرة برمجية", en: "Software Bug", desc: ") ): خطأ في تصميم أو تنفيذ البرمجية قد يسبب خللاً وظيفياً أو يفتح باباً لمخاطر أمنية عند الاستغلال." },
{ ar: "ثغرة البروتوكول", en: "Protocol Vulnerability", desc: ") ): خلل في بروتوكول الاتصال أو في تطبيقه، يمكن استغلاله للتنصت على البيانات أو التلاعب بها أو تجاوز الضوابط الأمنية.  " },
{ ar: "ثغرة التشفير", en: "Cryptographic Flaw", desc: ") ): ضعف في خوارزمية التشفير أو في طريقة تطبيقها، يؤدي إلى إمكان كسر الحماية أو كشف البيانات المشفرة.  " },
{ ar: "ثغرة التكوين", en: "Configuration Flaw", desc: ") ): خطأ في إعدادات الأجهزة أو البرمجيات أو الخدمات، يؤدي إلى إضعاف الحماية ويفتح المجال للوصول غير المصرح به. " },
{ ar: "ثغرة حقن الأوامر", en: "Injection Flaw", desc: ")): خلل يسمح بإدخال أوامر أو تعليمات برمجية خبيثة إلى النظام أو قاعدة البيانات لتنفيذها بصورة غير مشروعة.  " },
{ ar: "ثغرة الدفع الإلكتروني", en: "Payment Flaw", desc: ")): ضعف في أنظمة أو بوابات الدفع الرقمي، يمكن استغلاله لسرقة بيانات الدفع أو تجاوز آليات التحقق.  " },
{ ar: "ثغرة الشبكة", en: "Network Vulnerability", desc: ")): ضعف في تصميم الشبكة أو إعداداتها أو حمايتها، يتيح اعتراض البيانات أو الولوج غير المصرح به إلى الأنظمة المتصلة بها.  " },
{ ar: "ثغرة الويب", en: "Web Vulnerability", desc: ")): نقطة ضعف في تطبيقات أو مواقع الويب، يمكن استغلالها لسرقة الجلسات أو البيانات أو تنفيذ أوامر غير مشروعة.  " },
{ ar: "ثغرة كلمة المرور", en: "Password Flaw", desc: ") ): ضعف يتعلق بإنشاء كلمات المرور أو تخزينها أو إدارتها، بما يجعلها عرضة للكشف أو الاستغلال.  " },
{ ar: "ثغرة يوم الصفر", en: "Zero-Day Vulnerability", desc: ") ): ثغرة أمنية غير معروفة للجهة المطورة أو غير مُصحّحة بعد، ويُستغلها المهاجم قبل إصدار تحديث أمني لمعالجتها." },
{ ar: "ثنائي العامل", en: "Two-Factor", desc: ")): وصف يُستخدم للدلالة على الاعتماد على عاملين للتحقق من الهوية أو تأمين الدخول، ويظهر في سياقات مثل 2FA والتحقق الثنائي.  " },
{ ar: "جدار حماية", en: "Firewall", desc: ")): منظومة أمنية تتحكم في حركة المرور الشبكية وفق قواعد محددة، فتسمح أو تمنع الاتصالات لحماية الشبكات والأنظمة." },
{ ar: "جدار حماية تطبيقات الويب", en: "Web Application Firewall, WAF", desc: ")): جدار حماية متخصص في حماية تطبيقات الويب عبر فحص طلبات HTTP ومنع هجمات مثل حقن SQL وXSS.." },
{ ar: "جدار حماية من الجيل التالي", en: "Next Generation Firewall, NGFW", desc: ")): جدار حماية يدمج قدرات متقدمة مثل فحص التطبيقات، منع التسلل، والتحكم الدقيق بالسياسات بناء على المستخدم والسياق." },
{ ar: "جدار حماية البريد الإلكتروني", en: "Email Security Gateway", desc: ")): بوابة أمنية ترشح رسائل البريد لمنع التصيد والبرمجيات الخبيثة والرسائل المزعجة قبل وصولها للمستخدم." },
{ ar: "جدار حماية الشبكة", en: "Network Firewall", desc: ") ): جدار حماية يطبق سياسات أمنية على مستوى الشبكة، غالباً عند نقاط العبور بين الشبكات الداخلية والخارجية." },
{ ar: "جذر الثقة", en: "Root of Trust", desc: ")): أساس تقني أو مكون موثوق يُبنى عليه التحقق من سلامة النظام، مثل مفاتيح جذرية أو عتاد موثوق." },
{ ar: "جذر الشهادة", en: "Root Certificate", desc: ")): شهادة رقمية عليا تُستخدم كأساس لسلسلة الثقة في البنية التحتية للمفاتيح العامةPKI) ) وتُعتمد للتحقق من شهادات أخرى." },
{ ar: "جذر نظام أسماء النطاقات", en: "DNS Root", desc: ") ): المستوى الأعلى في نظام DNS, ويتضمن بيانات خوادم الجذر التي توجه طلبات أسماء النطاقات ضمن التسلسل الهرمي." },
{ ar: "جسر شبكي", en: "Network Bridge", desc: ")): جهاز أو وظيفة شبكية تربط شبكتين على مستوى طبقة ربط البيانات، وقد تُستخدم لتجزئة الشبكة أو دمجها." },
{ ar: "جسر افتراضي", en: "Virtual Bridge", desc: ")): وظيفة برمجية داخل منصات الافتراضية تربط شبكات افتراضية أو تربط الافتراضي بالفعلي وفق إعدادات محددة." },
{ ar: "جرائم افتراضية", en: "Cybercrimes", desc: ")): أفعال جنائية ترتكب عبر البيئة الرقمية أو تقع على نظم المعلومات، مثل الدخول غير المشروع والاحتيال والابتزاز وتعطيل الخدمات." },
{ ar: "جرائم تقنية المعلومات", en: "Computer and Information Technology Crimes", desc: "وصف شامل للجرائم التي تستهدف نظم المعلومات أو تُرتكب باستخدامها، ويُستخدم في السياقات التشريعية والتنظيمية." },
{ ar: "جريمة تصيّد", en: "Phishing Crime", desc: ")): فعل احتيالي يقوم على خداع المستخدم للحصول على بياناته أو دفعه لتنفيذ إجراء ضار، عبر رسائل أو مواقع مزيفة." },
{ ar: "جريمة ابتزاز رقمي", en: "Cyber Extortion", desc: ")): تهديد أو ضغط لإجبار الضحية على دفع مال أو تقديم منفعة، غالباً باستخدام بيانات مسروقة أو تشفير الملفات أو تهديد النشر." },
{ ar: "جريمة انتحال هوية رقمية", en: "Digital Identity Theft", desc: ")): الاستيلاء على بيانات هوية أو اعتمادها للتصرف باسم الغير على نحو غير مشروع." },
{ ar: "جلسة", en: "Session", desc: ")): فترة اتصال منطقية بين المستخدم والخدمة الرقمية تُدار بمعرف جلسة أو رمز تحقق، وتؤثر في التتبع والخصوصية والإثبات." },
{ ar: "جلسة مصادقة", en: "Authentication Session", desc: ")): جلسة ترتبط بمرحلة تحقق الهوية، وتحدد مدة الصلاحية وحالة الدخول وإدارة الرموز." },
{ ar: "جلسة مستخدم", en: "User Session", desc: ")): حالة تشغيل أو تفاعل تخص مستخدماً معيناً داخل خدمة رقمية، وقد تُسجل لأغراض أمنية أو تشغيلية." },
{ ar: "جهة إصدار الشهادات", en: "Certificate Authority, CA", desc: ")): جهة موثوقة تصدر شهادات رقمية للتحقق من هوية مواقع أو أشخاص أو أنظمة ضمن PKI." },
{ ar: "جهة تحكم بالبيانات", en: "Data Controller", desc: ") ): الجهة التي تحدد أغراض ووسائل معالجة البيانات الشخصية، وتتحمل التزامات قانونية تتعلق بالشفافية والخصوصية." },
{ ar: "جهة معالجة البيانات", en: "Data Processor", desc: ") ): الجهة التي تعالج البيانات نيابة عن جهة التحكم، وفق تعليماتها وبما يفرض التزامات تعاقدية وتنظيمية." },
{ ar: "جهة إنفاذ القانون", en: "Law Enforcement Authority", desc: ") ): جهة مختصة قانوناً بالتحري والضبط والتحقيق في الجرائم، بما في ذلك الجرائم الرقمية." },
{ ar: "جهاز", en: "Device", desc: "(: Device) أداة مادية أو ذكية قادرة على معالجة البيانات أو الاتصال بالشبكات، وقد تكون مصدراً للأدلة الرقمية أو محلاً للاعتداء المعلوماتي." },
{ ar: "جهاز توجيه", en: "Router", desc: ":(Router) جهاز يوجه حزم البيانات بين الشبكات اعتماداً على جداول التوجيه، ويؤثر في مسار الاتصال وتحديد نقاط العبور الفنية." },
{ ar: "جهاز كشف التسلل", en: "intrusion Detection System, IDS", desc: "نظام يراقب الشبكة أو المضيف لرصد الأنشطة المشبوهة والتنبيه عنها دون منعها بالضرورة." },
{ ar: "جهاز منع التسلل", en: "Intrusion Prevention System, IPS", desc: ") ): نظام يرصد محاولات التسلل ويمنعها تلقائياً وفق سياسات محددة." },
{ ar: "جيل خامس", en: "Fifth Generation, 5G", desc: "G, Fifth Generation) 5): الجيل الخامس من تقنيات الاتصالات المتنقلة، يتميز بسرعات أعلى وزمن استجابة أقل ويدعم كثافة اتصال كبيرة للأجهزة." },
{ ar: "جيل سادس", en: "Sixth Generation, 6G", desc: "G, Sixth Generation) 6): توصيف بحثي وتقني للجيل التالي المتوقع بعد 5G, ما زال في طور التطوير والمعايير الناشئة." },
{ ar: "جودة الخدمة", en: "Quality of Service, QoS", desc: ")): آليات لإدارة حركة الشبكة وضمان أولوية لبعض البيانات، بما ينعكس على أداء الخدمات الحساسة مثل الصوت والفيديو.  " },
{ ar: "حاسوب", en: "Computer", desc: ")): جهاز أو منظومة إلكترونية قادرة على معالجة البيانات وتخزينها واسترجاعها وتنفيذ الأوامر والبرامج، ويُعد من الوسائط الأساسية في البيئة الرقمية. " },
{ ar: "حاسوب شخصي", en: "Personal Computer, PC", desc: ")): جهاز حاسوب مخصص للاستخدام الفردي، ويُستخدم في تشغيل التطبيقات ومعالجة البيانات والاتصال بالشبكات." },
{ ar: "حاسوب مركزي", en: "Mainframe", desc: ")): حاسوب عالي القدرة يُستخدم لمعالجة كميات كبيرة من البيانات وتشغيل تطبيقات وخدمات مؤسسية واسعة النطاق." },
{ ar: "حاشية سفلية رقمية", en: "Digital Footnote", desc: ")): إحالة توثيقية تضاف إلى النص الرقمي أو الإلكتروني لتأكيد معلومة أو عزوها إلى مصدرها." },
{ ar: "حاضنة بيانات", en: "Data Repository", desc: ") ):  بيئة أو نظام مخصص لحفظ البيانات وتنظيمها وإدارتها وإتاحة الوصول إليها وفق سياسات محددة." },
{ ar: "حاضنة رقمية", en: "Digital Platform Incubator", desc: ")): بيئة أو إطار رقمي يُستخدم لتطوير المشروعات أو التطبيقات أو الخدمات التقنية ودعم نموها." },
{ ar: "حاوية افتراضية", en: "Container", desc: ")): بيئة تشغيل معزولة نسبياً تُستخدم لتشغيل التطبيقات ومكوناتها بصورة مستقرة وقابلة للنقل بين الأنظمة." },
{ ar: "حجب إلكتروني", en: "Electronic Blocking", desc: ")): إجراء تقني أو تنظيمي يؤدي إلى منع الوصول إلى محتوى أو خدمة أو موقع إلكتروني." },
{ ar: "حجب موقع إلكتروني", en: "Website Blocking", desc: ")): منع الوصول إلى موقع أو نطاق معين كلياً أو جزئياً بوسائل تقنية أو بأمر تنظيمي أو قضائي." },
{ ar: "حجز نطاق", en: "Domain Seizure", desc: ")): إجراء يؤدي إلى تعطيل استخدام اسم نطاق أو وضعه تحت سيطرة جهة مختصة، غالباً في سياق نزاع أو إجراء قضائي أو تنظيمي." },
{ ar: "حشد", en: "Crowdsourcing", desc: ")): الحصول على خدمات أو أفكار أو محتوى من مجموعة كبيرة من الأشخاص عبر الإنترنت." },
{ ar: "حق الخصوصية في العالم الافتراضي", en: "Right to Privacy in Cyberspace", desc: "حق الأفراد في التحكم في بياناتهم ومعلوماتهم داخل البيئات الرقمية، بما يشمل حدود جمعها ومعالجتها ومشاركتها." },
{ ar: "حق الوصول الرقمي", en: "Digital Access Right", desc: ") ): حق الأفراد في النفاذ إلى الخدمات أو الموارد أو المنصات الرقمية وفقاً للأطر القانونية والتنظيمية المعمول بها." },
{ ar: "حق المحو الرقمي", en: "Right to Erasure", desc: ") ): حق يخول الشخص طلب حذف بياناته الرقمية أو إزالتها في الحالات التي يجيزها القانون." },
{ ar: "حقوق رقمية", en: "Digital Rights", desc: ")): حقوق الأفراد في البيئة الرقمية، مثل حماية البيانات والخصوصية وحرية التعبير والنفاذ إلى الخدمات الرقمية." },
{ ar: "حكومة إلكترونية", en: "E-Government", desc: ")): استخدام الجهات الحكومية للتقنيات الرقمية لتقديم الخدمات والإجراءات الإدارية للجمهور وتحسين الكفاءة والشفافية." },
{ ar: "حوسبة سحابية", en: "Cloud Computing", desc: ")): تقديم خدمات حوسبية، مثل الخوادم والتخزين وقواعد البيانات، عبر الإنترنت بدلاً من الاعتماد على موارد محلية فقط." },
{ ar: "حوسبة ضبابية", en: "Fog Computing", desc: ")): نموذج حوسبي وسيط بين الحوسبة السحابية والأجهزة الطرفية، يهدف إلى تقريب المعالجة من مصدر البيانات وتقليل زمن الاستجابة." },
{ ar: "حوسبة متنقلة", en: "Mobile Computing", desc: ")): قدرة المستخدمين على استخدام الخدمات والتقنيات الرقمية أثناء التنقل عبر أجهزة محمولة وشبكات لاسلكية." },
{ ar: "حوسبة موزعة", en: "Distributed Computing", desc: ")): نمط حوسبي تُوزع فيه المعالجة أو التخزين أو المهام على أكثر من جهاز أو عقدة مترابطة." },
{ ar: "حقل بيانات", en: "Data Field", desc: ") ):  عنصر أو خانة مخصصة لحفظ قيمة معينة ضمن سجل أو قاعدة بيانات أو نموذج رقمي." },
{ ar: "حلقة وصل رقمية", en: "Digital Gateway", desc: ")): نقطة أو وسيلة تربط بين نظامين أو شبكتين أو خدمتين رقميتين لتسهيل انتقال البيانات أو الطلبات أو الخدمات." },
{ ar: "حماية البيانات", en: "Data Protection", desc: ") ): مجموعة القواعد والإجراءات القانونية والتنظيمية والتقنية الرامية إلى صون البيانات من المعالجة غير المشروعة أو الوصول غير المصرح به أو التلف أو الفقدان." },
{ ar: "حماية الخصوصية", en: "Privacy Protection", desc: ":(Privacy Protection) تدابير قانونية أو تقنية أو تنظيمية تهدف إلى صون خصوصية الأفراد ومنع التعدي على بياناتهم أو حياتهم الرقمية." },
{ ar: "حماية طرفية", en: "Endpoint Protection", desc: ":(Endpoint Protection) وسائل أمنية لحماية الأجهزة الطرفية، مثل الحواسيب والهواتف، من البرمجيات الخبيثة والاختراقات وسوء الاستخدام." },
{ ar: "حماية متقدمة من التهديدات", en: "Advanced Threat Protection, ATP", desc: ":(Advanced Threat Protection, ATP) منظومة أمنية تجمع تقنيات متعددة لرصد التهديدات المتقدمة ومنعها والاستجابة لها." },
{ ar: "خادم", en: "Server", desc: ")): جهاز حاسوب أو نظام يوفر موارد أو خدمات أو بيانات لأجهزة أو مستخدمين آخرين عبر الشبكة." },
{ ar: "خادم أسماء النطاقات", en: "DNS Server", desc: ":(DNS Server) خادم يتولى معالجة طلبات تحويل أسماء النطاقات إلى عناوين بروتوكول الإنترنت والعكس." },
{ ar: "خادم تطبيقات", en: "Application Server", desc: ")): خادم مخصص لتشغيل التطبيقات وتقديم وظائفها وخدماتها للمستخدمين أو للأنظمة الأخرى." },
{ ar: "خادم بريد إلكتروني", en: "Mail Server", desc: ")): خادم يتولى إرسال رسائل البريد الإلكتروني أو استقبالها أو تخزينها وإدارتها." },
{ ar: "خادم ويب", en: "Web Server", desc: ")): خادم يقدّم صفحات الويب والموارد المرتبطة بها استجابةً لطلبات HTTP أو HTTPS." },
{ ar: "خادم وسائط", en: "Media Server", desc: ")): خادم مخصص لتخزين المحتوى الصوتي أو المرئي وبثه أو إتاحته للمستخدمين عبر الشبكة." },
{ ar: "خادم وكيل", en: "Proxy Server", desc: ")): خادم يعمل وسيطاً بين العميل والخادم المقصود، وقد يُستخدم لتحسين الأداء أو الحماية أو إدارة الوصول." },
{ ar: "خوادم افتراضية", en: "Virtual Servers", desc: ")): تقسيم خادم فيزيائي إلى عدة خوادم افتراضية تعمل بصورة مستقلة وتُدار كل منها كبيئة منفصلة." },
{ ar: "خوادم وكيلة", en: "Proxy Servers", desc: ") ): تعمل كوسيط بين العميل والخادم المستهدف، ويمكنها تصفية المحتوى أو تحسين الخصوصية أو إدارة الاتصال.  " },
{ ar: "ختم إلكتروني", en: "Electronic Seal", desc: ")): وسيلة رقمية تُستخدم لإثبات صدور مستند أو رسالة من شخص اعتباري أو جهة معينة وضمان سلامتها." },
{ ar: "ختم زمني إلكتروني", en: "Electronic Time Stamp", desc: ":(Electronic Time Stamp) إثبات رقمي يحدد وقت إنشاء مستند أو توقيع أو معاملة إلكترونية أو إيداعها." },
{ ar: "خرق أمني", en: "Security Breach", desc: ":(Security Breach) واقعة تؤدي إلى المساس بسرية النظام أو سلامته أو توافره بسبب دخول غير مشروع أو ضعف أمني أو سلوك ضار." },
{ ar: "خرق بيانات", en: "Data Breach", desc: ":(Data Breach) وصول غير مصرح به إلى بيانات أو كشفها أو تسريبها أو فقدانها على نحو يخل بحمايتها أو خصوصيتها." },
{ ar: "خريطة موقع", en: "Sitemap", desc: ":(Sitemap) ملف أو بنية تنظيمية تُظهر صفحات الموقع وروابطه لتيسير فهرسته أو التنقل داخله." },
{ ar: "خوارزمية", en: "Algorithm", desc: ":(Algorithm) مجموعة خطوات أو قواعد منطقية محددة تُستخدم لمعالجة البيانات أو حل مشكلة أو تنفيذ وظيفة رقمية." },
{ ar: "خوارزمية تجزئة", en: "Hash Algorithm", desc: ") ): خوارزمية تُحوّل البيانات إلى قيمة مختصرة ثابتة الطول تُستخدم للتحقق من سلامة البيانات أو مطابقتها." },
{ ar: "خوارزمية تشفير", en: "Encryption Algorithm", desc: ")): خوارزمية تُستخدم لتحويل البيانات إلى صيغة غير مقروءة إلا لمن يملك وسيلة فكها." },
{ ar: "خوارزمية تعلم آلي", en: "Machine Learning Algorithm", desc: ")): خوارزمية تمكّن النظام من تحليل البيانات واستخلاص أنماط أو تنبؤات أو قرارات بصورة آلية." },
{ ar: "خدمة إلكترونية", en: "Electronic Service", desc: ")): خدمة تُقدَّم أو تُدار عبر وسائط رقمية أو عبر الإنترنت دون الحاجة إلى الحضور المادي المباشر." },
{ ar: "خدمة استضافة", en: "Hosting Service", desc: ")): خدمة تتيح تخزين المواقع أو التطبيقات أو البيانات على خوادم متصلة بالشبكة وإتاحتها للمستخدمين." },
{ ar: "خدمة اسم النطاق", en: "Domain Name Service", desc: ") ): خدمة تتعلق بتسجيل أسماء النطاقات أو إدارتها أو ربطها بالموارد الرقمية ذات الصلة." },
{ ar: "خدمة تحقق", en: "Verification Service", desc: ")): خدمة تقنية أو قانونية تُستخدم للتأكد من صحة بيانات أو هوية أو توقيع أو مستند رقمي." },
{ ar: "خدمة رقمية", en: "Digital Service", desc: ")): خدمة تعتمد في تقديمها أو تشغيلها أو إدارتها على البنية الرقمية أو الشبكات أو المنصات الإلكترونية." },
{ ar: "خدمة سحابية", en: "Cloud Service", desc: ")): خدمة تُقدَّم عبر الحوسبة السحابية، مثل التخزين أو المعالجة أو التطبيقات أو البنية التحتية الرقمية." },
{ ar: "خصوصية البيانات", en: "Data Privacy", desc: ")): حماية البيانات الشخصية من الاستخدام أو الكشف أو المعالجة غير المشروعة، وتمكين صاحبها من التحكم في حدود تداولها." },
{ ar: "خصوصية حسب التصميم", en: "Privacy by Design", desc: ") ): مبدأ يقتضي إدماج متطلبات الخصوصية في تصميم الأنظمة والخدمات الرقمية منذ البداية لا باعتبارها معالجة لاحقة." },
{ ar: "خصوصية رقمية", en: "Digital Privacy", desc: ")): حق الأفراد في التحكم بمعلوماتهم الشخصية في البيئة الرقمية، وما يتصل بذلك من جمع ومعالجة واستخدام ومشاركة.   " },
{ ar: "دالة تجزئة", en: "Hash Function", desc: ")): دالة رياضية تحول البيانات إلى قيمة مختصرة ثابتة الطول، وتُستخدم للتحقق من سلامة البيانات أو مطابقتها." },
{ ar: "دارك ويب", en: "Dark Web", desc: ")): جزء من الشبكة لا يمكن الوصول إليه عبر المتصفحات التقليدية، ويستلزم برامج أو إعدادات خاصة، وقد يرتبط باستخدامات مشروعة أو غير مشروعة.  " },
{ ar: "دخول غير مشروع", en: "Unauthorized Access", desc: ")): الولوج إلى نظام أو شبكة أو حساب أو بيانات دون إذن قانوني أو تقني صحيح." },
{ ar: "دردشة فورية", en: "Instant Messaging", desc: ")): تواصل متزامن عبر الرسائل النصية، وقد يشمل الصوت أو الصورة بحسب التطبيق المستخدم." },
{ ar: "دعوى إلكترونية", en: "Electronic Lawsuit", desc: ")): دعوى تُرفع أو تُدار أو تُتابع عبر الوسائط أو المنصات الرقمية وفقاً للإجراءات المعمول بها.  " },
{ ar: "دفاع رقمي", en: "Digital Defense", desc: ")): تدابير وإجراءات تقنية أو تنظيمية تهدف إلى حماية الأنظمة والشبكات والبيانات من الهجمات أو التهديدات الرقمية." },
{ ar: "دفتر أستاذ موزع", en: "Distributed Ledger", desc: ":(Distributed Ledger) سجل رقمي موزع تُثبت فيه المعاملات أو البيانات عبر عدة عقد مترابطة، ويُعد البلوك تشين أحد تطبيقاته.  دفع إلكتروني Electronic Payment)): إتمام المعاملات المالية بوسائل إلكترونية، مثل البطاقات أو المحافظ أو المنصات الرقمية." },
{ ar: "دفع رقمي", en: "Digital Payment", desc: ":(Digital Payment) وسيلة دفع تعتمد على الأنظمة أو التطبيقات الرقمية لإجراء المقابل المالي دون تداول نقدي مباشر." },
{ ar: "دفق بيانات", en: "Data Stream", desc: ") ): تدفق مستمر أو متتابع للبيانات بين الأنظمة أو التطبيقات أو الأجهزة في الزمن الحقيقي أو شبه الحقيقي." },
{ ar: "دلائل وصفية", en: "Metadata", desc: ")): بيانات تصف بيانات أخرى، مثل تاريخ الإنشاء أو التعديل أو المالك أو الموقع أو نوع الملف." },
{ ar: "دليل جنائي رقمي", en: "Digital Forensic Evidence", desc: ")): أثر أو معلومة رقمية يُعتمد عليها في الفحص الجنائي والتحليل الفني لإثبات واقعة أو نفيها، مصدره المعمل الجنائي." },
{ ar: "دليل رقمي", en: "Digital Evidence", desc: ")): بيانات أو معلومة أو أثر مستخلص من جهاز أو نظام معلومات، يصلح للاحتجاج به في التحقيق أو الإثبات وفقاً للقواعد القانونية." },
{ ar: "دمج رقمي", en: "Digital Inclusion", desc: ")): سياسات وإجراءات واستراتيجيات تهدف إلى تضييق الفجوة الرقمية وتمكين الأفراد والفئات من الوصول إلى التقنيات والخدمات الرقمية." },
{ ar: "دورة حياة البيانات", en: "Data Lifecycle", desc: ") ): المراحل التي تمر بها البيانات منذ إنشائها أو جمعها، مروراً بمعالجتها وتخزينها واستخدامها، وانتهاءً بحذفها أو إتلافها." },
{ ar: "ديدان إلكترونية", en: "Worms", desc: ")): برمجيات خبيثة قادرة على نسخ نفسها والانتشار تلقائياً عبر الشبكات أو الأنظمة دون تدخل مباشر من المستخدم. " },
{ ar: "ذاكرة الوصول العشوائي", en: "Random Access Memory, RAM", desc: ") ): ذاكرة رئيسية مؤقتة تُستخدم لتخزين البيانات والتعليمات التي يحتاجها النظام أثناء التشغيل، وتفقد محتواها بانقطاع الطاقة." },
{ ar: "ذاكرة تخزين مؤقت", en: "Cache Memory", desc: ")): مساحة تخزين سريعة تُستخدم للاحتفاظ ببيانات متكررة الاستخدام لتقليل زمن الوصول وتحسين الأداء." },
{ ar: "ذاكرة مؤقتة للإنترنت", en: "Internet Cache", desc: ")): نسخ محلية من صفحات الويب أو عناصرها يخزنها المتصفح أو النظام لتحميلها بسرعة عند إعادة الطلب." },
{ ar: "ذكاء اصطناعي", en: "Artificial Intelligence, AI", desc: ")): تقنيات وأنظمة تمكّن الآلة من محاكاة بعض وظائف الإدراك أو التحليل أو اتخاذ القرار بالاعتماد على البيانات والخوارزميات." },
{ ar: "ذكاء اصطناعي توليدي", en: "Generative Artificial Intelligence", desc: ")): نمط من أنظمة الذكاء الاصطناعي يُنتج محتوى جديداً، مثل النصوص أو الصور أو الصوت أو البرمجيات، بناءً على أنماط مستخلصة من البيانات." },
{ ar: "ذكاء اصطناعي مسؤول", en: "Responsible Artificial Intelligence", desc: ")): نهج يهدف إلى تصميم واستخدام أنظمة الذكاء الاصطناعي على نحو يراعي الشفافية والإنصاف والمساءلة وتقليل المخاطر." },
{ ar: "ذكاء اصطناعي موثوق", en: "Trustworthy Artificial Intelligence", desc: ")): ذكاء اصطناعي يُصمم ويُستخدم بطريقة تضمن الاعتمادية والسلامة واحترام الحقوق والمعايير القانونية والأخلاقية." },
{ ar: "ذكاء جماعي", en: "Collective Intelligence", desc: ")): معرفة أو قدرة تحليلية تنشأ من تعاون عدد كبير من الأفراد أو النظم وتبادلهم للمعلومات عبر بيئة رقمية أو شبكة" },
{ ar: "رابط إلكتروني", en: "Hyperlink", desc: "): وصلة رقمية تتيح الانتقال من صفحة أو مورد رقمي إلى صفحة أو مورد آخر داخل الشبكة أو خارجها." },
{ ar: "رابط عميق", en: "Deep Link", desc: "): رابط يقود مباشرة إلى صفحة داخلية أو مورد محدد داخل موقع أو تطبيق، دون المرور بالواجهة الرئيسية." },
{ ar: "راوتر", en: "Router", desc: ")): جهاز شبكي يوجّه حزم البيانات بين الشبكات اعتماداً على جداول التوجيه، ويحدد المسار المناسب لوصولها إلى وجهتها." },
{ ar: "رخصة استخدام", en: "License", desc: ")): إذن قانوني أو تعاقدي يحدد شروط استعمال برنامج أو محتوى أو خدمة رقمية وحدود ذلك الاستعمال." },
{ ar: "رخصة برمجية", en: "Software License", desc: ") ): إطار قانوني يحدد شروط استخدام البرمجيات وتعديلها وتوزيعها وحقوق الأطراف المرتبطة بها." },
{ ar: "رخصة مفتوحة المصدر", en: "Open Source License", desc: ")) : رخصة تسمح باستخدام البرمجية ودراستها وتعديلها وإعادة توزيعها وفق شروط محددة." },
{ ar: "ردع رقمي", en: "Cyber Deterrence", desc: ") ): مجموعة تدابير وسياسات تهدف إلى منع الهجمات الرقمية أو تقليلها عبر تقوية الحماية أو التهديد بالكشف أو المنع أو العقاب." },
{ ar: "رسائل غير مرغوب فيها", en: "Spam", desc: ")): رسائل إلكترونية أو رقمية تُرسل بكميات كبيرة دون طلب من المتلقي، وغالباً لأغراض دعائية أو احتيالية أو ضارة." },
{ ar: "رصد رقمي", en: "Digital Monitoring", desc: ")): متابعة الأنشطة أو البيانات أو الحوادث داخل الأنظمة أو الشبكات أو المنصات الرقمية لأغراض أمنية أو تشغيلية أو تنظيمية." },
{ ar: "رفض الخدمة", en: "Denial of Service, DoS", desc: ") ): هجوم أو فعل يؤدي إلى تعطيل خدمة رقمية أو إبطائها أو منع الوصول إليها عبر استنزاف مواردها أو إغراقها بالطلبات." },
{ ar: "رفض الخدمة الموزع", en: "Distributed Denial of Service, DDoS", desc: ") ): هجوم يعتمد على عدد كبير من الأجهزة أو المصادر لإغراق الخدمة أو الخادم بالطلبات وتعطيله." },
{ ar: "رقابة رقمية", en: "Digital Surveillance", desc: ")): مراقبة أو تتبع أو تقييد الوصول أو المحتوى أو السلوك داخل البيئة الرقمية بوسائل تقنية أو تنظيمية." },
{ ar: "رقم تعريف الجلسة", en: "Session ID", desc: ")): معرّف رقمي يُخصص لجلسة المستخدم لتمييزها وإدارتها أثناء الاتصال بالخدمة أو الموقع." },
{ ar: "رقم تعريف شخصي", en: "Personal Identification Number, PIN", desc: ") ): رمز رقمي يُستخدم للتحقق من هوية المستخدم أو تمكينه من النفاذ إلى خدمة أو جهاز أو حساب." },
{ ar: "رقمنه", en: "Digitization", desc: ")): تحويل المعلومات أو الوثائق أو الإشارات من صورتها المادية أو التقليدية إلى صيغة رقمية قابلة للمعالجة بالحاسوب." },
{ ar: "رمز استجابة سريع", en: "Quick Response Code, QR Code", desc: ") ): رمز ثنائي الأبعاد يُستخدم لتخزين بيانات قابلة للقراءة الآلية، مثل الروابط أو المعرفات أو معلومات الاتصال." },
{ ar: "رمز تحقق", en: "Verification Code", desc: ")): رمز مؤقت أو ثابت يُستخدم للتأكد من هوية المستخدم أو صحة إجراء معين داخل النظام الرقمي." },

{ ar: "شراء داخل التطبيق", en: "In-App Purchase", desc: "): عملية شراء تتم من داخل تطبيق رقمي للحصول على محتوى أو خدمات أو مزايا إضافية." },
{ ar: "شروط الاستخدام", en: "Terms of Use", desc: ")): قواعد تعاقدية تحدد حقوق والتزامات المستخدم ومقدم الخدمة عند استخدام موقع أو تطبيق أو خدمة رقمية." },
{ ar: "شيفرة تحقق لمرة واحدة", en: "One-Time Password, OTP", desc: ")): رمز مؤقت يُستخدم لمرة واحدة للتحقق من هوية المستخدم أو تأكيد إجراء معين." }	
        ];

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0, 0);
        }

        function render(items) {
            const list = document.getElementById('termsList');
            list.innerHTML = items.map(item => `
                <div class="term-card">
                    <div class="term-header" onclick="toggleTerm(this.parentElement)">
                        <span class="term-title">${item.ar}</span>
                        <i data-lucide="chevron-down" size="18"></i>
                    </div>
                    <div class="term-content">
                        <p style="color:var(--accent); font-weight:700; margin-bottom:10px;">${item.en}</p>
                        <p style="font-size:0.95rem; line-height:1.5; color:#475569;">${item.desc}</p>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function toggleTerm(selectedCard) {
            const isActive = selectedCard.classList.contains('active');
            document.querySelectorAll('.term-card').forEach(card => card.classList.remove('active'));
            if (!isActive) selectedCard.classList.add('active');
        }

        document.getElementById('searchInput').oninput = (e) => {
            const v = e.target.value.toLowerCase();
            render(dictionaryData.filter(i => i.ar.includes(v) || i.en.toLowerCase().includes(v)));
        };

        // البدء
        render(dictionaryData);
        lucide.createIcons();
    </script>
</body>
